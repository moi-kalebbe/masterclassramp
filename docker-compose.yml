services:
  masterclassramp:
    image: ${MASTERCLASSRAMP_IMAGE:-ghcr.io/moi-kalebbe/masterclassramp:latest}
    pull_policy: always
    container_name: masterclassramp
    restart: unless-stopped
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.docker.compose.project=masterclassramp"
